name: Deploy Frontend (React) to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/polls-frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'frontend/polls-frontend/package-lock.json'
      
      - name: Install dependencies
        run: npm install
        working-directory: ./frontend/polls-frontend
      
      - name: Build React app
        run: npm run build
        working-directory: ./frontend/polls-frontend
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/polls-frontend/build
          destination_dir: ./